# ═══════════════════════════════════════════════════════════════════════════
# Cadencia — Docker Compose (Pull from Docker Hub)
# Use this file to run the full stack from pre-built images on Docker Hub.
#
# Usage:
#   1. Copy backend/.env.example → backend/.env  (fill in secrets)
#   2. docker compose -f docker-compose.hub.yml pull
#   3. docker compose -f docker-compose.hub.yml up
#
# Images are pulled from: docker.io/shreyayss/cadencia-*
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 + pgvector ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cadencia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cadencia_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cadencia}
    ports:
      - "5432:5432"
    volumes:
      - cadencia_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cadencia} -d ${POSTGRES_DB:-cadencia}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-cadencia_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - cadencia_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cadencia_dev}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── MinIO (S3-compatible, for agent memory vault) ────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - cadencia_minio_data:/data

  # ── Algorand localnet (dev mode) ────────────────────────────────────────
  algorand:
    image: algorand/algod:latest
    restart: unless-stopped
    environment:
      DEV_MODE: "1"
      TOKEN: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      ALGOD_PORT: "8080"
    ports:
      - "4001:8080"
      - "4002:7833"
    volumes:
      - cadencia_algorand_data:/algod/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Database Migration (one-off) ────────────────────────────────────────
  migration:
    image: shreyayss/cadencia-backend:latest
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cadencia}:${POSTGRES_PASSWORD:-cadencia_dev}@db:5432/${POSTGRES_DB:-cadencia}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Backend (FastAPI) — pulled from Docker Hub ──────────────────────────
  backend:
    image: shreyayss/cadencia-backend:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override for Docker internal networking
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cadencia}:${POSTGRES_PASSWORD:-cadencia_dev}@db:5432/${POSTGRES_DB:-cadencia}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cadencia_dev}@redis:6379/0
      AWS_S3_ENDPOINT: http://minio:9000
      ALGORAND_ALGOD_ADDRESS: http://algorand:8080
      ALGORAND_ALGOD_TOKEN: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      ALGORAND_KMD_ADDRESS: http://algorand:7833
      ALGORAND_KMD_TOKEN: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      ALGORAND_NETWORK: localnet
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      algorand:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Frontend (Next.js) — pulled from Docker Hub ─────────────────────────
  frontend:
    image: shreyayss/cadencia-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_INTERNAL_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_ENABLE_MOCKS: "false"
      NEXT_PUBLIC_ALGORAND_NETWORK: localnet
      NEXT_PUBLIC_ALGOD_SERVER: http://localhost:4001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  cadencia_db_data:
  cadencia_redis_data:
  cadencia_minio_data:
  cadencia_algorand_data:
