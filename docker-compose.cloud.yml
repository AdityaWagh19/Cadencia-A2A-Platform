
# ═══════════════════════════════════════════════════════════════════════════
# Cadencia Full Stack — Docker Compose (Cloud / AWS Production)
# Services: Redis, Backend (FastAPI), Frontend (Next.js)
#
# Differences from docker-compose.local.yml:
#   - NO postgres service     → database is Supabase Cloud (ap-south-1)
#   - NO minio service        → replaced by real AWS S3 (ap-south-1)
#   - NO algorand service     → uses Algorand TestNet via Nodely public API
#   - migration service       → runs alembic upgrade head before backend starts
#
# Prerequisites (set in backend/.env or pass as shell env):
#   1. DATABASE_URL           → Supabase pooler URL    (port 6543)
#   2. DATABASE_DIRECT_URL    → Supabase direct URL    (port 5432, for migrations)
#   3. REDIS_PASSWORD         → strong random password
#   4. JWT_PRIVATE_KEY / JWT_PUBLIC_KEY → RS256 key pair
#   5. ALGORAND_ESCROW_CREATOR_MNEMONIC → 25-word platform wallet mnemonic
#   6. GROQ_API_KEY           → LLM provider key
#   7. AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY → IAM user for S3
#   8. AWS_S3_BUCKET_NAME     → e.g. cadencia-vault  (create bucket first)
#   9. CORS_ALLOWED_ORIGINS   → your real domain e.g. https://app.cadencia.in
#  10. TRUSTED_HOSTS          → your real domain e.g. app.cadencia.in
#
# Usage:
#   docker compose -f docker-compose.cloud.yml up --build
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── Redis 7 ─────────────────────────────────────────────────────────────
  # Used for: session cache, rate-limiting, background job queue
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: >
      redis-server
      --appendonly yes
      --requirepass Cad3nc1aR3d1s!Pr0d
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Cad3nc1aR3d1s!Pr0d", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Database migration (one-off) ─────────────────────────────────────────
  # Runs alembic upgrade head against Supabase direct URL (port 5432).
  # PgBouncer pooler (port 6543) does NOT support prepared statements used by alembic.
  migration:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migration
    environment:
      # Use DATABASE_DIRECT_URL (port 5432) for migrations — NOT the pooler
      DATABASE_URL: ${DATABASE_DIRECT_URL:-postgresql+asyncpg://postgres:Shreyas%40123@db.skjnprzknzcrbkivqfpa.supabase.co:5432/postgres?ssl=require}
      PGSSLROOTCERT: /app/supabase-root-ca.pem
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  # ── Backend (FastAPI) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env          # DATABASE_URL → Supabase pooler (port 6543)
    environment:
      APP_ENV: production

      # ── Database (Supabase) ─────────────────────────────────────────────
      # DATABASE_URL comes from env_file (pooler port 6543)
      PGSSLROOTCERT: /app/supabase-root-ca.pem

      # ── Redis ───────────────────────────────────────────────────────────
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      # ── Algorand (TestNet via Nodely public API) ─────────────────────────
      ALGORAND_NETWORK: testnet
      ALGORAND_ALGOD_ADDRESS: https://testnet-api.4160.nodely.dev
      ALGORAND_ALGOD_TOKEN: ""
      ALGORAND_BALANCE_ALGOD_ADDRESS: https://testnet-api.4160.nodely.dev
      ALGORAND_BALANCE_ALGOD_TOKEN: ""

      # ── AWS S3 (real S3 — no endpoint override means boto3 uses aws) ─────
      # AWS_S3_ENDPOINT is intentionally NOT set here → uses real AWS S3
      # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_S3_BUCKET_NAME → from env_file
      AWS_DEFAULT_REGION: ap-south-1

      # ── LLM ─────────────────────────────────────────────────────────────
      LLM_PROVIDER: groq
      LLM_MODEL: llama-3.3-70b-versatile
      LLM_TEMPERATURE: "0.3"
      LLM_MAX_TOKENS: "2048"
      # GROQ_API_KEY comes from env_file

      # ── CORS + Security ──────────────────────────────────────────────────
      # CORS_ALLOWED_ORIGINS and TRUSTED_HOSTS are set in backend/.env
      # Current value: http://3.108.194.225:3000

      # ── Escrow ───────────────────────────────────────────────────────────
      ESCROW_DRY_RUN_ENABLED: "false"

      # ── Application ──────────────────────────────────────────────────────
      # /docs and /redoc are disabled when APP_ENV=production
      X402_SIMULATION_MODE: "false"

    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Frontend (Next.js) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Server-side proxy rewrites use Docker internal network → no CORS
      NEXT_INTERNAL_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_ENABLE_MOCKS: "false"
      NEXT_PUBLIC_ALGORAND_NETWORK: testnet
      NEXT_PUBLIC_ALGOD_SERVER: https://testnet-api.4160.nodely.dev
    depends_on:
      backend:
        condition: service_healthy

# No local volumes needed:
#   - PostgreSQL → Supabase Cloud
#   - Redis      → ephemeral cache (in-container, no persistence needed in prod)
#   - S3         → AWS S3 ap-south-1
