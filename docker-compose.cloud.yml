
# ═══════════════════════════════════════════════════════════════════════════
# Cadencia Full Stack — Docker Compose (Cloud / Supabase)
# Services: Redis, MinIO, Algorand, Backend (FastAPI), Frontend (Next.js)
#
# Differences from docker-compose.yml:
#   - NO postgres service   → database is Supabase Cloud (ap-south-1)
#   - NO migrate service    → run `alembic upgrade head` separately against
#                             DATABASE_DIRECT_URL (port 5432) before deploying
#
# Usage:
#   docker compose -f docker-compose.cloud.yml up --build
#
# Prerequisites:
#   1. backend/.env has DATABASE_URL and DATABASE_DIRECT_URL set to Supabase
#   2. Alembic migrations already applied: alembic upgrade head
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── Redis 7 ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible, for agent memory vault) ─────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # ── Algorand localnet (dev mode) ──────────────────────────────────────
  algorand:
    image: algorand/algod:latest
    restart: unless-stopped
    environment:
      DEV_MODE: "1"
      TOKEN: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      ALGOD_PORT: "8080"
    ports:
      - "4001:8080"   # algod REST API  (internal 8080 → host 4001)
      - "4002:7833"   # KMD REST API    (internal 7833 → host 4002)
    volumes:
      - algoranddata:/algod/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend (FastAPI) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env          # DATABASE_URL → Supabase pooler (port 6543)
    environment:
      # Override service-internal URLs for Docker networking
      REDIS_URL: redis://redis:6379/0
      AWS_S3_ENDPOINT: http://minio:9000
      # Use TestNet (not local dev node) so platform wallet has real funds
      ALGORAND_ALGOD_ADDRESS: https://testnet-api.4160.nodely.dev
      ALGORAND_ALGOD_TOKEN: ""
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      # Supabase PgBouncer uses a private root CA (not in any public trust store).
      # asyncpg reads PGSSLROOTCERT when ssl="require" (sslmode string) to load the CA
      # into its internally-built SSLContext — the only path where SNI + cert verify both work.
      PGSSLROOTCERT: /app/supabase-root-ca.pem
      # ── LLM (Fix #2) ────────────────────────────────────────────────
      LLM_PROVIDER: groq
      GROQ_API_KEY: ${GROQ_API_KEY:-}          # set in shell env or CI/CD secrets
      LLM_MODEL: llama-3.3-70b-versatile
      LLM_TEMPERATURE: "0.3"
      LLM_MAX_TOKENS: "512"
    depends_on:
      redis:
        condition: service_healthy
      algorand:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Frontend (Next.js) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # NEXT_PUBLIC_API_URL intentionally unset → defaults to '' → relative URLs → no CORS
      # Server-side proxy rewrites use Docker internal network to reach backend
      NEXT_INTERNAL_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_ENABLE_MOCKS: "false"
      NEXT_PUBLIC_ALGORAND_NETWORK: testnet
      NEXT_PUBLIC_ALGOD_SERVER: https://testnet-api.4160.nodely.dev
    depends_on:
      backend:
        condition: service_healthy


volumes:
  miniodata:
  algoranddata:
