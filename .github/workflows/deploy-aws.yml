# ═══════════════════════════════════════════════════════════════════════════
# Cadencia Platform — AWS Deploy Pipeline
# Triggered on push to `production` branch.
# Builds Docker images, pushes to ECR, then deploys to EC2 via SSH.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID       — IAM user with ECR push + EC2 describe permissions
#   AWS_SECRET_ACCESS_KEY   — IAM secret key
#   EC2_HOST                — EC2 public IP address
#   EC2_SSH_KEY             — Contents of cadencia-deploy.pem
#   BACKEND_ENV             — Full contents of .env.production for the backend
# ═══════════════════════════════════════════════════════════════════════════

name: Deploy to AWS

on:
  push:
    branches:
      - production

env:
  AWS_REGION: ap-south-1
  ACCOUNT_ID: 315326805553
  BACKEND_IMAGE: 315326805553.dkr.ecr.ap-south-1.amazonaws.com/cadencia-backend
  FRONTEND_IMAGE: 315326805553.dkr.ecr.ap-south-1.amazonaws.com/cadencia-frontend

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.sha.outputs.short }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.sha.outputs.short }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_ENABLE_MOCKS=false
            NEXT_PUBLIC_ALGORAND_NETWORK=testnet
            NEXT_PUBLIC_ALGOD_SERVER=https://testnet-api.4160.nodely.dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > cadencia-deploy.pem
          chmod 400 cadencia-deploy.pem

      - name: Write .env.production to EC2
        run: |
          echo "${{ secrets.BACKEND_ENV }}" > .env.production
          scp -o StrictHostKeyChecking=no -i cadencia-deploy.pem \
            .env.production \
            ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/app/.env.production

      - name: Copy docker-compose.prod.yml to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i cadencia-deploy.pem \
            docker-compose.prod.yml \
            ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/app/docker-compose.prod.yml

      - name: Deploy on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i cadencia-deploy.pem ec2-user@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd /home/ec2-user/app

            # Authenticate Docker with ECR
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin \
              315326805553.dkr.ecr.ap-south-1.amazonaws.com

            # Pull latest images
            export BACKEND_IMAGE=315326805553.dkr.ecr.ap-south-1.amazonaws.com/cadencia-backend:latest
            export FRONTEND_IMAGE=315326805553.dkr.ecr.ap-south-1.amazonaws.com/cadencia-frontend:latest
            export REDIS_PASSWORD=$(grep REDIS_PASSWORD .env.production | cut -d= -f2)

            # Bring up stack (migration runs first, then backend, then frontend)
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -f
          ENDSSH
