# ═══════════════════════════════════════════════════════════════════════════
# Cadencia — Docker Compose (Pull from Docker Hub)
# All transactions happen on Algorand TestNet (no local Algorand node needed).
#
# Usage:
#   1. Copy backend/.env.example → backend/.env  (fill in secrets)
#   2. docker compose -f docker-compose.hub.yml pull
#   3. docker compose -f docker-compose.hub.yml up
#
# Images:
#   - Backend:  docker.io/shreyayss/cadencia-backend:latest
#   - Frontend: docker.io/shreyayss/cadencia-frontend:latest
#
# Algorand: TestNet (https://testnet-api.4160.nodely.dev)
#   - Fund the platform wallet via https://bank.testnet.algorand.network/
#   - Verify transactions on https://lora.algokit.io/testnet
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 + pgvector ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cadencia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cadencia_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cadencia}
    ports:
      - "5432:5432"
    volumes:
      - cadencia_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cadencia} -d ${POSTGRES_DB:-cadencia}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-cadencia_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - cadencia_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cadencia_dev}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Database Migration (one-off) ────────────────────────────────────────
  migration:
    image: shreyayss/cadencia-backend:latest
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cadencia}:${POSTGRES_PASSWORD:-cadencia_dev}@db:5432/${POSTGRES_DB:-cadencia}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Backend (FastAPI) — pulled from Docker Hub ──────────────────────────
  backend:
    image: shreyayss/cadencia-backend:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Docker internal networking overrides
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cadencia}:${POSTGRES_PASSWORD:-cadencia_dev}@db:5432/${POSTGRES_DB:-cadencia}
      REDIS_URL: redis://:${REDIS_PASSWORD:-cadencia_dev}@redis:6379/0
      # Algorand TestNet — no local node needed
      ALGORAND_NETWORK: testnet
      ALGORAND_ALGOD_ADDRESS: https://testnet-api.4160.nodely.dev
      ALGORAND_ALGOD_TOKEN: ""
      ALGORAND_BALANCE_ALGOD_ADDRESS: https://testnet-api.4160.nodely.dev
      ALGORAND_BALANCE_ALGOD_TOKEN: ""
      # Platform wallet mnemonic from .env
      ALGORAND_ESCROW_CREATOR_MNEMONIC: ${ALGORAND_ESCROW_CREATOR_MNEMONIC:-}
      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      # CORS
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      migration:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Frontend (Next.js) — pulled from Docker Hub ─────────────────────────
  frontend:
    image: shreyayss/cadencia-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_INTERNAL_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_ENABLE_MOCKS: "false"
      NEXT_PUBLIC_ALGORAND_NETWORK: testnet
      NEXT_PUBLIC_ALGOD_SERVER: https://testnet-api.4160.nodely.dev
    depends_on:
      backend:
        condition: service_healthy

volumes:
  cadencia_db_data:
  cadencia_redis_data:
