# ═══════════════════════════════════════════════════════════════════════════
# Cadencia Platform — CD Pipeline
# Builds and pushes Docker images to GitHub Container Registry (ghcr.io)
# on tagged releases. Deploys to EC2 via SSH.
# ═══════════════════════════════════════════════════════════════════════════

name: CD

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ── Build & Push Docker Images ───────────────────────────────────────────
  publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.images.outputs.backend }}
      frontend_image: ${{ steps.images.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image names (lowercase)
        id: images
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          echo "backend=ghcr.io/${REPO}/backend" >> $GITHUB_OUTPUT
          echo "frontend=ghcr.io/${REPO}/frontend" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:${{ steps.meta.outputs.version }}
            ${{ steps.images.outputs.backend }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.frontend }}:${{ steps.meta.outputs.version }}
            ${{ steps.images.outputs.frontend }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=
            NEXT_PUBLIC_ENABLE_MOCKS=false
            NEXT_PUBLIC_ALGORAND_NETWORK=testnet
            NEXT_PUBLIC_ALGOD_SERVER=https://testnet-api.4160.nodely.dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

  # ── Deploy to EC2 ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e
            cd /home/ubuntu/cadencia

            # Pull latest compose file from repo
            git pull origin main

            # Authenticate with GitHub Container Registry
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u AdityaWagh19 --password-stdin

            # Pull latest images
            docker compose -f docker-compose.cloud.yml pull

            # Run database migrations before swapping containers
            docker compose -f docker-compose.cloud.yml run --rm backend alembic upgrade head

            # Restart containers with fresh images
            docker compose -f docker-compose.cloud.yml down --remove-orphans
            docker compose -f docker-compose.cloud.yml up -d

            # Clean up old dangling images
            docker image prune -f

            echo "Deployment complete."
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Create GitHub Release ────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images
            ```
            docker pull ${{ needs.publish.outputs.backend_image }}:${{ github.ref_name }}
            docker pull ${{ needs.publish.outputs.frontend_image }}:${{ github.ref_name }}
            ```
