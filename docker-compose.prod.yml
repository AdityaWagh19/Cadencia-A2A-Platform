version: "3.9"

# ─────────────────────────────────────────────────────────────
# Cadencia — Production (EC2 + RDS)
# Images pulled from ECR; RDS Postgres used instead of local DB
# Access: http://<EC2_PUBLIC_IP>:8000  (backend)
#         http://<EC2_PUBLIC_IP>:3000  (frontend)
# ─────────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migration:
    image: ${BACKEND_IMAGE}
    command: alembic upgrade head
    env_file: .env.production
    environment:
      - DATABASE_URL=${DATABASE_DIRECT_URL}
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env.production
    depends_on:
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_ENABLE_MOCKS=false
      - NEXT_PUBLIC_ALGORAND_NETWORK=testnet
      - NEXT_PUBLIC_ALGOD_SERVER=https://testnet-api.4160.nodely.dev
      - NEXT_INTERNAL_BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:
