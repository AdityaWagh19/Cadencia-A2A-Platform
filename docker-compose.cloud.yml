
# ═══════════════════════════════════════════════════════════════════════════
# Cadencia Full Stack — Docker Compose (EC2 Cloud Deployment)
# Services: Redis, Backend (FastAPI), Frontend (Next.js)
#
# Architecture:
#   - Database: Supabase Cloud (no local Postgres)
#   - S3: Real AWS S3 (no MinIO)
#   - Algorand: TestNet via Nodely API (no local node)
#   - Images: Pre-built from GHCR (GitHub Container Registry)
#
# Prerequisites:
#   1. .env file in project root with all secrets (see deployment.md Phase 3)
#   2. Docker + Docker Compose installed on EC2
#   3. Authenticated with GHCR: docker login ghcr.io
#
# Usage:
#   docker compose -f docker-compose.cloud.yml pull
#   docker compose -f docker-compose.cloud.yml run --rm backend alembic upgrade head
#   docker compose -f docker-compose.cloud.yml up -d
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ── Redis 7 (password-secured) ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports exposed — only accessible within Docker network

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    image: ghcr.io/adityawagh19/cadencia-a2a-platform/backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # ── Production flags ──
      APP_ENV: production
      DEBUG: "false"
      ESCROW_DRY_RUN_ENABLED: "false"

      # ── Redis (password-authenticated, Docker internal) ──
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0

      # ── CORS (set in .env on EC2) ──
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

      # ── Algorand TestNet (no local node) ──
      ALGORAND_NETWORK: testnet
      ALGORAND_ALGOD_ADDRESS: https://testnet-api.4160.nodely.dev
      ALGORAND_ALGOD_TOKEN: ""

      # ── Real AWS S3 (no MinIO — leave endpoint blank for native AWS) ──
      AWS_S3_ENDPOINT: ""

      # ── Supabase PgBouncer private CA for SSL verification ──
      PGSSLROOTCERT: /app/supabase-root-ca.pem
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    # No ports exposed — frontend proxies API calls via Next.js rewrites

  # ── Frontend (Next.js) ──────────────────────────────────────────────────
  frontend:
    image: ghcr.io/adityawagh19/cadencia-a2a-platform/frontend:latest
    restart: unless-stopped
    # No host ports — Caddy reverse-proxies to frontend:3000
    environment:
      # Server-side proxy rewrites → backend via Docker internal network
      NEXT_INTERNAL_BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_ENABLE_MOCKS: "false"
      NEXT_PUBLIC_ALGORAND_NETWORK: testnet
      NEXT_PUBLIC_ALGOD_SERVER: https://testnet-api.4160.nodely.dev
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${WALLETCONNECT_PROJECT_ID}
    depends_on:
      backend:
        condition: service_healthy

  # ── Caddy (TLS reverse proxy — auto Let's Encrypt) ────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  caddy_data:
  caddy_config:
